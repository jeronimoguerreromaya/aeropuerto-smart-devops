services:

  # Base de datos PostgreSQL
  flytrack-db:
    image: postgres:16-alpine
    container_name: flytrack-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot
  flytrack-api:
    build:
      context: ./flytrack-api
      dockerfile: Dockerfile
    container_name: flytrack-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      flytrack-db:
        condition: service_healthy

  # Frontend Angular (Nginx)
  flytrack-front:
    build:
      context: ./flytrack-front
      dockerfile: Dockerfile
    container_name: flytrack-front
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - flytrack-api

volumes:
  postgres_data:

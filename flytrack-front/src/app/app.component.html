<div class="app-wrapper">
  <!-- Header -->
  <header class="app-header">
    <div class="header-brand">
      <span class="header-logo">✈️</span>
      <div>
        <h1 class="header-title">FlyTrack</h1>
        <p class="header-subtitle">AeroPuerto Smart — Sistema de Información</p>
      </div>
    </div>
  </header>

  <!-- Navegación -->
  <nav class="app-nav">
    <button
      [class.active]="vistaActual === 'vuelos'"
      (click)="cambiarVista('vuelos')"
    >
      ✈️ Itinerarios
    </button>
    <button
      [class.active]="vistaActual === 'notificaciones'"
      (click)="cambiarVista('notificaciones')"
    >
      🔔 Notificaciones
    </button>
    <button
      [class.active]="vistaActual === 'equipaje'"
      (click)="cambiarVista('equipaje')"
    >
      🧳 Reportar Equipaje
    </button>
  </nav>

  <!-- Contenido principal -->
  <main class="app-main">
    <app-vuelo-list        *ngIf="vistaActual === 'vuelos'"></app-vuelo-list>
    <app-notification-panel *ngIf="vistaActual === 'notificaciones'"></app-notification-panel>
    <app-equipaje-form     *ngIf="vistaActual === 'equipaje'"></app-equipaje-form>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <p>© 2025 AeroPuerto Smart · Universidad del Quindío · Ingeniería de Software III</p>
  </footer>
</div>

name: FlyTrack CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Evita ejecuciones duplicadas en PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Tests + cobertura + análisis SonarCloud (Backend)
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          # SonarCloud necesita el historial completo para blame annotations
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache de dependencias Gradle (~/.gradle/caches)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('flytrack-api/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # Cache de SonarCloud para no re-descargar el scanner
      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}
          restore-keys: sonar-

      - name: Ejecutar tests y generar reporte de cobertura
        working-directory: flytrack-api
        run: ./gradlew test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Análisis de calidad con SonarCloud
        working-directory: flytrack-api
        run: ./gradlew sonar --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: flytrack-api/build/reports/tests/test/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Tests Frontend (Angular + Karma)
  # ─────────────────────────────────────────────
  test-frontend:
    name: 🧪 Test Frontend (Angular 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache de node_modules para no reinstalar en cada push
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: flytrack-front/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('flytrack-front/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Instalar dependencias
        working-directory: flytrack-front
        run: npm install

      - name: Ejecutar tests
        working-directory: flytrack-front
        run: npm test
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: Build de producción (verificación)
        working-directory: flytrack-front
        run: npm run build:prod

  # ─────────────────────────────────────────────
  # JOB 3: Build y push de imágenes Docker
  # Solo corre si ambos jobs de test pasan
  # Solo en push a main (no en PRs)
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # necesario para push a ghcr.io

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Metadata para taggear las imágenes con SHA y 'latest'
      - name: Metadata imagen Backend
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/flytrack-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Metadata imagen Frontend
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/flytrack-front
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # BuildKit para builds más rápidos con cache
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./flytrack-api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./flytrack-front
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4: Deploy a staging (SSH + Docker Compose)
  # Solo corre si el build fue exitoso
  # Solo en push a main
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy a Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: staging
      url: http://${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/aeropuerto-smart-devops

            # Actualizar el código
            git pull origin main

            # Login al registry desde el servidor
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Bajar las nuevas imágenes y levantar los servicios
            docker compose pull
            docker compose up -d --remove-orphans

            # Limpiar imágenes antiguas
            docker image prune -f

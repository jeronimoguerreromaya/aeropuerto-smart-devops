name: FlyTrack CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Evita ejecuciones duplicadas en PRs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Tests + cobertura + análisis SonarCloud (Backend)
  # ─────────────────────────────────────────────
  test-backend:
    name: Test Backend (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}
          restore-keys: sonar-

      - name: Ejecutar tests y generar reporte de cobertura
        working-directory: flytrack-api
        run: gradle test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Análisis de calidad con SonarCloud
        working-directory: flytrack-api
        run: gradle sonar --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: flytrack-api/build/reports/tests/test/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Tests Frontend (Angular + Karma)
  # ─────────────────────────────────────────────
  test-frontend:
    name: Test Frontend (Angular 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: flytrack-front
        run: npm install

      - name: Ejecutar tests
        working-directory: flytrack-front
        run: npm test
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: Build de producción (verificación)
        working-directory: flytrack-front
        run: npm run build:prod

  # ─────────────────────────────────────────────
  # JOB 3: Build y push de imágenes Docker
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata imagen Backend
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/flytrack-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Metadata imagen Frontend
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/flytrack-front
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./flytrack-api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./flytrack-front
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4: Deploy a Render via Deploy Hooks
  # Dispara redeploy en Render para backend y frontend
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: staging

    steps:
      - name: Deploy Backend en Render
        run: |
          curl -s --fail-with-body \
            "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            -X POST
          echo "✅ Backend deploy disparado"

      - name: Deploy Frontend en Render
        run: |
          curl -s --fail-with-body \
            "${{ secrets.RENDER_DEPLOY_HOOK_FRONT }}" \
            -X POST
          echo "✅ Frontend deploy disparado"
